apiVersion: apps/v1
kind: Deployment
metadata:
  name: dominik
  namespace: praxe2026
  labels:
    app: dominik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dominik
  template:
    metadata:
      labels:
        app: dominik
    spec:
      containers:
        - name: dominik
          image: ghcr.io/dominik-3/praxe-demo67:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: dominik-svc
  namespace: praxe2026
  labels:
    app: dominik
spec:
  selector:
    app: dominik
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080