apiVersion: apps/v1
kind: Deployment
metadata:
  name: dominik
  namespace: praxe2026
  labels:
    app: dominik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dominik
  template:
    metadata:
      labels:
        app: dominik
    spec:
      containers:
        - name: dominik
          image: ghcr.io/dominik-3/praxe-demo67:latest
          ports:
            - containerPort: 8080
